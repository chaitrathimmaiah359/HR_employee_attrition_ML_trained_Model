name: Employee Attrition ML CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Files
        run: |
          python -m py_compile train.py
          python -m py_compile predict.py
          python -m py_compile synthetic_data.py

      - name: Train Model
        run: |
          python train.py

      - name: Run Prediction
        run: |
          python predict.py

      - name: Success
        run: echo "🎉 ML pipeline completed successfully!"
